<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>root@willhuang:~</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 40px 20px; 
            margin: 0;
            line-height: 1.6;
        }
        .terminal { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #010409; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,255,0,0.1); 
            height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .header { 
            background: #161b22; 
            padding: 8px 15px; 
            color: #8b949e; 
            font-size: 14px; 
            border-bottom: 1px solid #30363d;
        }
        .content { 
            padding: 20px; 
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .prompt { color: #58a6ff; font-weight: bold; margin-right: 8px; }
        .command-text { color: #ffffff; font-weight: bold; }
        .output { color: #c9d1d9; margin: 10px 0 20px 0; white-space: pre-wrap; }
        .highlight { color: #f0883e; }
        .error { color: #ff7b72; }
        
        /* Interactive Input Styling */
        .input-line { display: flex; align-items: center; margin-top: 10px; }
        input[type="text"] {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            flex-grow: 1;
            outline: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #010409; border-left: 1px solid #30363d; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #58a6ff; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            input[type="text"] { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">bash - 100x30</div>
        <div class="content" id="terminal-content">
            <div id="output-history">
                <div class="output">Welcome to Will Huang's interactive portfolio.
Type '<span class="highlight">help</span>' to see a list of available commands.</div>
            </div>
            
            <div class="input-line">
                <span class="prompt">guest@willhuang:~$</span>
                <input type="text" id="command-input" autocomplete="off" autofocus>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('command-input');
        const outputHistory = document.getElementById('output-history');
        const terminalContent = document.getElementById('terminal-content');

        // Command Data
        const fileSystem = {
            'help': `Available commands:\n  <span class="highlight">whoami</span>       - Display basic information about me\n  <span class="highlight">skills</span>       - List technical skills and frameworks\n  <span class="highlight">experience</span>   - View my work history\n  <span class="highlight">projects</span>     - View recent cybersecurity & dev projects\n  <span class="highlight">contact</span>      - Get my contact information\n  <span class="highlight">clear</span>        - Clear the terminal screen`,
            
            'whoami': `<strong>Will Huang</strong>\nBSc in Computer Science | Wilfrid Laurier University\nBSc in Mathematics (Minor in CS & Stats) | University of Toronto\n\nDriven by system architecture, security operations, and data analysis. Experienced in blending statistical rigor with actionable software engineering.`,
            
            'skills': `{\n  "Languages": ["Python", "C", "C++", "Java", "JavaScript", "HTML", "CSS", "Swift", "R", "SQL"],\n  "Frameworks": ["PyTorch", "TensorFlow", "Pandas", "NodeJS", "ExpressJS", "React", "Bootstrap"],\n  "Tools": ["LLMs", "Git", "Docker", "MongoDB", "Linux/Unix"]\n}`,
            
            'experience': `<strong>Data Analyst @ Osiris Vertical Farm</strong> (Apr 2022 - Apr 2023)\nOptimized plant health by analyzing environmental and growth data using Python, Pandas, R, and Excel. Leveraged predictive modelling and regression analysis to forecast anomalies.\n\n<strong>Sales Professional & Key Holder @ Michael Hill</strong> (May 2023 - Present)\nManaged security protocols, staff supervision, and exceeded corporate KPIs by 20% ranking in the top 10% of regional performers.`,

            'projects': `<strong>1. Mini-Agentic SOC Log Parser</strong> (May 2026)\n<em>Stack: Docker, Python, Gemini API</em>\nEngineered a containerized AI threat-detection agent to identify SQL injection and brute-force SSH attacks from live logs. Automated structured JSON threat-classification pipelines to trigger simulated iptables blocking rules.\n\n<strong>2. Stealth Keylogger</strong> (Dec 2025)\n<em>Stack: Python, Low-level scripting</em>\nDeveloped a local monitoring application intercepting keystrokes while bypassing Windows Defender using hook managers. Analyzed endpoint vulnerabilities to document defensive mitigation strategies.`,

            'contact': `Location: Cambridge, ON\nEmail: willy0630@outlook.com\nLinkedIn: linkedin.com/in/willhuang\nGitHub: github.com/willhuang`
        };

        // Keep focus on the input field when clicking anywhere in the terminal
        document.querySelector('.terminal').addEventListener('click', () => {
            inputField.focus();
        });

        // Listen for the Enter key
        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = this.value.trim().toLowerCase();
                this.value = ''; // Clear input
                
                if (command === '') return;

                // Echo the command properly without escape characters
                const echoHTML = `<div class="prompt" style="display:inline-block;">guest@willhuang:~$</div> <span class="command-text">${command}</span>`;
                
                let responseHTML = '';

                // Process the command
                if (command === 'clear') {
                    outputHistory.innerHTML = '';
                    return;
                } else if (fileSystem[command]) {
                    responseHTML = `<div class="output">${fileSystem[command]}</div>`;
                } else {
                    responseHTML = `<div class="output error">bash: ${command}: command not found. Type 'help' for available commands.</div>`;
                }

                // Append to history
                const newBlock = document.createElement('div');
                newBlock.innerHTML = echoHTML + responseHTML;
                outputHistory.appendChild(newBlock);

                // Auto-scroll to bottom
                terminalContent.scrollTop = terminalContent.scrollHeight;
            }
        });
    </script>
</body>
</html>
